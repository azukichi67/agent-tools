services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - app-node-modules:/workspaces/app/node_modules
      - claude-code-config:/home/node/.claude
    command: sleep infinity
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      TZ: Asia/Tokyo
  db:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_PASSWORD: db_password
      POSTGRES_USER: db_user
      POSTGRES_DB: dev
      TZ: Asia/Tokyo
    ports:
      - "5432:5432"
volumes:
  app-node-modules:
  claude-code-config:
  postgres-data: